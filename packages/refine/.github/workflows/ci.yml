# =============================================================================
# CI Workflow — @abdokouta/react-cache
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔨 Build
        run: pnpm --filter @abdokouta/react-cache build

      - name: 🧪 Run tests
        run: pnpm --filter @abdokouta/react-cache test || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🎨 Check formatting
        run: pnpm run format:check || true

      - name: 🔍 Lint
        run: pnpm run lint || true
