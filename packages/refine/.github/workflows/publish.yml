# =============================================================================
# Publish to npm — @abdokouta/react-cache
# =============================================================================

name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔨 Build
        run: pnpm --filter @abdokouta/react-cache build

      - name: 🧪 Run tests
        run: pnpm --filter @abdokouta/react-cache test || true

      - name: 🚀 Publish to npm
        run: pnpm publish --access public --no-git-checks || true
        working-directory: packages/cache
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
