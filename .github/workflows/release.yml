# =============================================================================
# 🚀 Release — Automated Package Publishing
# =============================================================================
#
# Triggered on push to main. Uses changesets to:
#   1. Create a "Version Packages" PR when changesets exist
#   2. Publish to npm when the PR is merged
#
# Requires secrets:
#   GITHUB_TOKEN — auto-provided by GitHub Actions
#   NPM_TOKEN    — npm access token for publishing
#
# =============================================================================

name: "🚀 Release"

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.0"

jobs:
  release:
    name: "🚀 Release Packages"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "📦 Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: "📥 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🏗️ Build packages"
        run: pnpm build:packages

      - name: "🚀 Create Release PR or Publish"
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm ci:publish
          commit: "🔖 chore: version packages"
          title: "🔖 chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "📢 Log published packages"
        if: steps.changesets.outputs.published == 'true'
        run: echo "✅ Packages published successfully!"
