# =============================================================================
# 🔄 CI — Continuous Integration
# =============================================================================
#
# Runs on every push to main/develop and on all pull requests.
# Jobs: lint → build + test (parallel) → audit
#
# =============================================================================

name: "🔄 CI"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.0"

jobs:
  # ── 🔍 Lint & Type Check ─────────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Types"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: "📥 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🔍 Lint"
        run: pnpm lint
        continue-on-error: true

      - name: "🔎 Type check"
        run: pnpm check-types
        continue-on-error: true

      - name: "🎨 Format check"
        run: pnpm format:check
        continue-on-error: true

  # ── 🏗️ Build ──────────────────────────────────────────────────────────────
  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: "⚡ Turbo cache"
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: "📥 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🏗️ Build packages"
        run: pnpm build:packages

      - name: "🏗️ Build apps"
        run: pnpm build:apps

      - name: "📤 Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            apps/*/dist
          retention-days: 7

  # ── 🧪 Test ──────────────────────────────────────────────────────────────
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: "📥 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🧪 Run tests"
        run: pnpm test

  # ── 🔒 Security Audit ────────────────────────────────────────────────────
  audit:
    name: "🔒 Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: "📥 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🔒 Security audit"
        run: pnpm audit --audit-level=moderate
        continue-on-error: true
