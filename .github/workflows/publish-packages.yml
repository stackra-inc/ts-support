# =============================================================================
# 📦 Publish Packages — Manual Workflow
# =============================================================================
#
# Manually triggered workflow for publishing packages to npm.
# Use this when you want to publish without changesets.
#
# Requires secrets:
#   NPM_TOKEN — npm access token for publishing
#
# =============================================================================

name: "📦 Publish Packages"

on:
  workflow_dispatch:

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.0"

jobs:
  publish:
    name: "📦 Publish to npm"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📦 Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: "📥 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "✅ Validate"
        run: pnpm validate

      - name: "🏗️ Build packages"
        run: pnpm build:packages

      - name: "📦 Publish to npm"
        run: pnpm ci:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
